<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Timer</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="./favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="./favicon.ico"
      sizes="16x16 32x32"
    />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Made with ChatGPT and Claude -->

    <style>
      :root {
        --bg: #0f172a;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #111827;
        --accent: #22d3ee;
        --danger: #ef4444;
        --ok: #22c55e;
        --border: #1f2937;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font:
          16px/1.5 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--fg);
      }

      .container {
        max-width: 900px;
        margin-inline: auto;
        padding: 24px;
      }

      .header {
        margin-bottom: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        font-size: clamp(20px, 3vw, 28px);
        margin: 0;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .row > * {
        flex: 1 1 160px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      input,
      button {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #0b1220;
        color: var(--fg);
        padding: 10px 12px;
        white-space: nowrap;
      }

      input::placeholder {
        color: #6b7280;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        background: linear-gradient(180deg, #0ea5e9, #06b6d4);
        border: 1px solid #0369a1;
        color: black;
        font-weight: 700;
      }

      button.danger {
        background: transparent;
        border-color: #7f1d1d;
        color: #fecaca;
      }

      button.accent {
        background: transparent;
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Icon-only action buttons (Pause/Resume/Restart/Archive/Delete/Restore) */
      .controls button {
        box-sizing: border-box;
        padding: 8px;
        min-width: 36px;
        height: 36px;
        font-size: 16px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .help {
        color: var(--muted);
        font-size: 13px;
      }

      .list {
        margin-top: 18px;
      }

      /* Controls column is wide enough to fit its icon buttons on one line */
      .timer {
        display: grid;
        grid-template-columns: 1.2fr 2fr 0.8fr 150px;
        gap: 10px;
        align-items: center;
        border-top: 1px solid var(--border);
        padding: 10px 0;
        text-align: center;
      }

      /* Ends At + Remaining share one column: spread across it when there's room */
      .when-remain {
        display: flex;
        justify-content: space-evenly;
        gap: 8px;
      }

      .timer.list-header {
        border-top: none;
      }

      .timer.trash-row {
        grid-template-columns: 1.5fr 1fr 70px;
      }

      .timer.archive-row {
        grid-template-columns: 1.5fr 1fr 110px;
      }

      .timer.list-header .controls {
        justify-content: center;
        text-align: center;
      }

      .timer.trash-row .controls,
      .timer.archive-row .controls {
        justify-content: center;
        text-align: center;
      }

      .title {
        font-weight: 600;
        word-break: break-word;
        text-align: left;
      }

      .when,
      .remain,
      .status {
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
        font-weight: 700;
      }

      .status.done {
        color: var(--muted);
      }

      .controls {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        flex-wrap: wrap;
        text-align: right;
      }

      .footer {
        margin-top: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 640px) {
        .timer {
          grid-template-columns: 1.6fr 1fr 0.8fr 135px;
        }

        .timer.trash-row {
          grid-template-columns: 1.5fr 1fr 60px;
        }

        .timer.archive-row {
          grid-template-columns: 1.5fr 1fr 90px;
        }

        /* Stack Ends At above Remaining to save horizontal space */
        .when-remain {
          flex-direction: column;
          align-items: center;
          gap: 2px;
        }

        /* Tighten button spacing so it doesn't read wider than the column gaps */
        .controls {
          gap: 4px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Simple Timer</h1>
      </div>

      <div class="card" role="region" aria-label="Add Timer">
        <form id="timer-form" class="row" autocomplete="off">
          <div class="field">
            <label for="title">Title (optional)</label>
            <input
              id="title"
              name="title"
              placeholder="e.g., Tea / Meeting / Break"
            />
          </div>

          <div class="field">
            <label for="duration" title="mm:ss / minutes / 1h / 30s / 2d etc."
              >Duration</label
            >
            <input
              id="duration"
              name="duration"
              inputmode="numeric"
              placeholder="5:00 / 5 / 1h / 30s / 2d"
              required
            />
          </div>

          <div class="field">
            <label class="sr-only" for="add">Add</label>
            <button id="add" class="primary" type="submit">Add Timer</button>
          </div>
        </form>
      </div>

      <div class="card list" id="timers" role="region" aria-label="Timers">
        <div class="list-header timer" aria-hidden="true" style="opacity: 0.7">
          <div class="title">Title</div>
          <div class="when-remain">
            <div class="when">Ends At</div>
            <div class="remain">Remaining</div>
          </div>
          <div class="status">Status</div>
          <div class="controls">Actions</div>
        </div>
        <!-- Timers go here: generated by JavaScript -->
      </div>

      <div class="footer">
        <div class="help">Timers will beep when finished.</div>
        <button id="clear-all" class="danger" type="button">Delete All</button>
      </div>

      <div
        class="card list"
        id="archive-card"
        role="region"
        aria-label="Archived"
      >
        <div class="header" style="margin-bottom: 10px">
          <h2 style="font-size: 16px; margin: 0">Archived</h2>
          <span class="help">Kept until you restart or delete them.</span>
        </div>
        <div id="archive-empty" class="help">No archived timers.</div>
        <div
          class="timer list-header archive-row"
          id="archive-header"
          aria-hidden="true"
          style="opacity: 0.7; display: none"
        >
          <div class="title">Title</div>
          <div class="when">Archived At</div>
          <div class="controls">Actions</div>
        </div>
        <div id="archive-list"></div>
      </div>

      <div class="card list" id="trash-card" role="region" aria-label="Trash">
        <div class="header" style="margin-bottom: 10px">
          <h2 style="font-size: 16px; margin: 0">Trash</h2>
          <span class="help">Restorable for 5 minutes after deletion.</span>
        </div>
        <div id="trash-empty" class="help">Trash is empty.</div>
        <div
          class="timer list-header trash-row"
          id="trash-header"
          aria-hidden="true"
          style="opacity: 0.7; display: none"
        >
          <div class="title">Title</div>
          <div class="remain">Purges In</div>
          <div class="controls">Actions</div>
        </div>
        <div id="trash-list"></div>
      </div>
    </div>

    <script>
      (() => {
        /*** State ***/
        /** @type {{id:number,title:string,endAt:number,createdAt:number,notified:boolean,paused:boolean,pausedAt?:number,remainingAtPause?:number,originalDuration:number}[]} */
        let timers = [];
        /** @type {{id:number,title:string,originalDuration:number,deletedAt:number}[]} */
        let trash = [];
        /** @type {{id:number,title:string,originalDuration:number,archivedAt:number}[]} */
        let archived = [];
        let seq = 1;

        const TRASH_RETENTION_MS = 5 * 60 * 1000;

        /*** LocalStorage ***/
        const STORAGE_KEY = "simple-timer-data";

        function saveToStorage() {
          try {
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({ seq, timers, trash, archived }),
            );
          } catch (e) {
            console.warn("Failed to save to localStorage:", e);
          }
        }

        function loadFromStorage() {
          try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
              const parsed = JSON.parse(data);
              seq = parsed.seq || 1;
              timers = parsed.timers || [];
              trash = parsed.trash || [];
              archived = parsed.archived || [];
            }
          } catch (e) {
            console.warn("Failed to load from localStorage:", e);
          }
        }

        loadFromStorage();

        /*** Utilities ***/
        const html = (strings, ...values) => {
          return strings.reduce(
            (result, string) => `${result}${string}${values.shift() ?? ""}`,
            "",
          );
        };
        const $ = (sel, el = document) => el.querySelector(sel);
        const fmt2 = (n) => String(Math.floor(Math.abs(n))).padStart(2, "0");
        const clamp0 = (ms) => (ms < 0 ? 0 : ms);
        // time-only (no date)
        const toTime = (ts) =>
          new Date(ts).toLocaleTimeString([], { hour12: false });

        function parseDuration(input) {
          const s = String(input || "").trim();
          if (!s) return 0;

          if (/^\d+:\d{1,2}:\d{1,2}$/.test(s)) {
            const [h, m, sec] = s.split(":").map(Number);
            return (h * 60 * 60 + m * 60 + sec) * 1000;
          }

          if (/^\d+:\d{1,2}$/.test(s)) {
            const [m, sec] = s.split(":").map(Number);
            return (m * 60 + sec) * 1000;
          }

          if (/^\d+(?:\.\d+)?$/.test(s)) {
            // treat as minutes (allow decimals)
            return Math.round(parseFloat(s) * 60 * 1000);
          }

          // allow short units like 1h, 90s, 500ms, 2d
          const m = s.match(/^(\d+(?:\.\d+)?)(ms|s|m|h|d)$/i);
          if (m) {
            const v = parseFloat(m[1]);
            const unit = m[2].toLowerCase();

            if (unit === "ms") return Math.max(0, Math.round(v));
            if (unit === "s") return Math.round(v * 1000);
            if (unit === "m") return Math.round(v * 60 * 1000);
            if (unit === "h") return Math.round(v * 3600 * 1000);
            if (unit === "d") return Math.round(v * 86400 * 1000);
          }

          return 0;
        }

        function humanize(ms) {
          ms = Math.max(0, Math.round(ms));
          const totalSec = Math.floor(ms / 1000);
          const h = Math.floor(totalSec / 3600);
          const m = Math.floor((totalSec % 3600) / 60);
          const s = totalSec % 60;

          return `${fmt2(h)}:${fmt2(m)}:${fmt2(s)}`;
        }

        function formatDurationLabel(ms) {
          const totalSec = Math.round(Math.max(0, ms) / 1000);
          const d = Math.floor(totalSec / 86400);
          const h = Math.floor((totalSec % 86400) / 3600);
          const m = Math.floor((totalSec % 3600) / 60);
          const s = totalSec % 60;

          const parts = [];
          if (d) parts.push(`${d}d`);
          if (h) parts.push(`${h}h`);
          if (m) parts.push(`${m}m`);
          if (s || parts.length === 0) parts.push(`${s}s`);

          return parts.join(" ");
        }

        /*** Sound ***/
        let audioCtx = null;
        function playBeep(times = 3, freq = 1000, duration = 0.18, gap = 0.08) {
          try {
            if (!audioCtx) {
              audioCtx = new (window.AudioContext ||
                window.webkitAudioContext)();
            }

            const now = audioCtx.currentTime;
            for (let i = 0; i < times; i++) {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();

              osc.type = "sine";
              osc.frequency.value = freq;
              gain.gain.setValueAtTime(0.0001, now + i * (duration + gap));
              gain.gain.exponentialRampToValueAtTime(
                0.3,
                now + i * (duration + gap) + 0.01,
              );
              gain.gain.exponentialRampToValueAtTime(
                0.0001,
                now + i * (duration + gap) + duration,
              );
              osc.connect(gain).connect(audioCtx.destination);
              osc.start(now + i * (duration + gap));
              osc.stop(now + i * (duration + gap) + duration + 0.05);
            }
          } catch (e) {
            /* ignore if audio is unavailable */
            console.warn("Audio playback failed:", e);
          }
        }

        const listEl = $("#timers");

        /*** Render ***/
        function escapeHtml(s) {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return String(s).replace(/[&<>"']/g, (ch) => map[ch]);
        }

        function render() {
          // sort by end time ascending
          const sorted = [...timers].sort((a, b) => a.endAt - b.endAt);

          const timerEls = listEl.querySelectorAll(".timer:not(.list-header)");
          for (const timerEl of timerEls) {
            timerEl.remove();
          }

          for (const t of sorted) {
            const row = document.createElement("div");
            row.className = "timer";
            row.dataset.id = String(t.id);

            const now = Date.now();
            let remaining;
            if (t.paused) {
              remaining = t.remainingAtPause || 0;
            } else {
              remaining = t.endAt - now;
            }
            const done = remaining <= 0 && !t.paused;

            let statusText, statusClass;
            if (t.paused) {
              statusText = "Paused";
              statusClass = "done";
            } else if (done) {
              statusText = "Done";
              statusClass = "done";
            } else {
              statusText = "Running";
              statusClass = "ok";
            }

            const pauseResumeBtn = done
              ? html`<button
                  class="accent"
                  data-act="restart"
                  title="Restart"
                  aria-label="Restart"
                  type="button"
                >
                  🔄
                </button>`
              : t.paused
                ? html`<button
                    data-act="resume"
                    title="Resume"
                    aria-label="Resume"
                    type="button"
                  >
                    ▶️
                  </button>`
                : html`<button
                    data-act="pause"
                    title="Pause"
                    aria-label="Pause"
                    type="button"
                  >
                    ⏸️
                  </button>`;

            row.innerHTML = html`
              <div class="title">
                ${t.title
                  ? escapeHtml(t.title)
                  : `<span class="when">(${formatDurationLabel(t.originalDuration)})</span>`}
              </div>
              <div class="when-remain">
                <div class="when">
                  ${t.paused ? "--:--:--" : toTime(t.endAt)}
                </div>
                <div class="remain">${humanize(clamp0(remaining))}</div>
              </div>
              <div class="status ${statusClass}">${statusText}</div>
              <div class="controls">
                ${pauseResumeBtn}
                <button
                  data-act="archive"
                  title="Archive"
                  aria-label="Archive"
                  type="button"
                >
                  🗄️
                </button>
                <button
                  class="danger"
                  data-act="delete"
                  title="Delete"
                  aria-label="Delete"
                  type="button"
                >
                  🗑️
                </button>
              </div>
            `;

            listEl.appendChild(row);
          }
        }

        const trashListEl = $("#trash-list");
        const trashEmptyEl = $("#trash-empty");
        const trashHeaderEl = $("#trash-header");

        function renderTrash() {
          // sort by soonest to purge first
          const sorted = [...trash].sort((a, b) => a.deletedAt - b.deletedAt);

          trashEmptyEl.style.display = sorted.length ? "none" : "";
          trashHeaderEl.style.display = sorted.length ? "" : "none";
          trashListEl.innerHTML = "";

          const now = Date.now();
          for (const t of sorted) {
            const row = document.createElement("div");
            row.className = "timer trash-row";
            row.dataset.id = String(t.id);

            const purgesIn = clamp0(TRASH_RETENTION_MS - (now - t.deletedAt));

            row.innerHTML = html`
              <div class="title">
                ${t.title
                  ? escapeHtml(t.title)
                  : `<span class="when">(${formatDurationLabel(t.originalDuration)})</span>`}
              </div>
              <div class="remain">${humanize(purgesIn)}</div>
              <div class="controls">
                <button
                  class="accent"
                  data-act="restore"
                  title="Restore"
                  aria-label="Restore"
                  type="button"
                >
                  ↩️
                </button>
              </div>
            `;

            trashListEl.appendChild(row);
          }
        }

        function moveToTrash(t) {
          trash.push({
            id: t.id,
            title: t.title,
            originalDuration: t.originalDuration,
            deletedAt: Date.now(),
          });
        }

        function purgeExpiredTrashItems() {
          const now = Date.now();
          const before = trash.length;
          trash = trash.filter((t) => now - t.deletedAt < TRASH_RETENTION_MS);
          return trash.length !== before;
        }

        const archiveListEl = $("#archive-list");
        const archiveEmptyEl = $("#archive-empty");
        const archiveHeaderEl = $("#archive-header");

        function renderArchived() {
          // most recently archived first
          const sorted = [...archived].sort(
            (a, b) => b.archivedAt - a.archivedAt,
          );

          archiveEmptyEl.style.display = sorted.length ? "none" : "";
          archiveHeaderEl.style.display = sorted.length ? "" : "none";
          archiveListEl.innerHTML = "";

          for (const t of sorted) {
            const row = document.createElement("div");
            row.className = "timer archive-row";
            row.dataset.id = String(t.id);

            row.innerHTML = html`
              <div class="title">
                ${t.title
                  ? escapeHtml(t.title)
                  : `<span class="when">(${formatDurationLabel(t.originalDuration)})</span>`}
              </div>
              <div class="when">${toTime(t.archivedAt)}</div>
              <div class="controls">
                <button
                  class="accent"
                  data-act="restart"
                  title="Restart"
                  aria-label="Restart"
                  type="button"
                >
                  🔄
                </button>
                <button
                  class="danger"
                  data-act="delete"
                  title="Delete"
                  aria-label="Delete"
                  type="button"
                >
                  🗑️
                </button>
              </div>
            `;

            archiveListEl.appendChild(row);
          }
        }

        function moveToArchive(t) {
          archived.push({
            id: t.id,
            title: t.title,
            originalDuration: t.originalDuration,
            archivedAt: Date.now(),
          });
        }

        /*** Actions ***/
        // Create timer (Enter or button click)
        $("#timer-form").addEventListener("submit", (e) => {
          e.preventDefault();

          const title = $("#title").value;
          const dur = parseDuration($("#duration").value);
          const now = Date.now();

          if (!dur || dur <= 0) {
            alert("Enter duration as mm:ss or minutes (number).");
            return;
          }

          timers.push({
            id: seq++,
            title,
            endAt: now + dur,
            createdAt: now,
            notified: false,
            paused: false,
            originalDuration: dur,
          });

          $("#title").value = "";
          $("#duration").value = "";

          saveToStorage();
          render();

          $("#title").focus();
        });

        // Timer controls (pause/resume/restart/delete)
        listEl.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          const act = btn.getAttribute("data-act");
          const row = btn.closest(".timer");
          const id = Number(row?.dataset.id);
          const t = timers.find((x) => x.id === id);

          if (act === "delete" && t) {
            timers = timers.filter((x) => x.id !== id);
            moveToTrash(t);
            saveToStorage();
            render();
            renderTrash();
          } else if (act === "archive" && t) {
            timers = timers.filter((x) => x.id !== id);
            moveToArchive(t);
            saveToStorage();
            render();
            renderArchived();
          } else if (act === "pause" && t && !t.paused) {
            const now = Date.now();
            t.paused = true;
            t.pausedAt = now;
            t.remainingAtPause = t.endAt - now;
            saveToStorage();
            render();
          } else if (act === "resume" && t && t.paused) {
            const now = Date.now();
            t.paused = false;
            t.endAt = now + (t.remainingAtPause || 0);
            t.notified = false;
            delete t.pausedAt;
            delete t.remainingAtPause;
            saveToStorage();
            render();
          } else if (act === "restart" && t) {
            const now = Date.now();
            t.endAt = now + t.originalDuration;
            t.createdAt = now;
            t.notified = false;
            t.paused = false;
            delete t.pausedAt;
            delete t.remainingAtPause;
            saveToStorage();
            render();
          }
        });

        // Trash controls (restore)
        trashListEl.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          const act = btn.getAttribute("data-act");
          const row = btn.closest(".timer");
          const id = Number(row?.dataset.id);
          const idx = trash.findIndex((x) => x.id === id);
          if (idx === -1) return;

          if (act === "restore") {
            const [t] = trash.splice(idx, 1);
            const now = Date.now();

            timers.push({
              id: seq++,
              title: t.title,
              endAt: now + t.originalDuration,
              createdAt: now,
              notified: false,
              paused: false,
              originalDuration: t.originalDuration,
            });

            saveToStorage();
            render();
            renderTrash();
          }
        });

        // Archive controls (restart/delete)
        archiveListEl.addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          const act = btn.getAttribute("data-act");
          const row = btn.closest(".timer");
          const id = Number(row?.dataset.id);
          const idx = archived.findIndex((x) => x.id === id);
          if (idx === -1) return;
          const t = archived[idx];

          if (act === "restart") {
            const now = Date.now();
            archived.splice(idx, 1);
            timers.push({
              id: seq++,
              title: t.title,
              endAt: now + t.originalDuration,
              createdAt: now,
              notified: false,
              paused: false,
              originalDuration: t.originalDuration,
            });
            saveToStorage();
            render();
            renderArchived();
          } else if (act === "delete") {
            archived.splice(idx, 1);
            moveToTrash(t);
            saveToStorage();
            renderArchived();
            renderTrash();
          }
        });

        // Clear all timers
        $("#clear-all").addEventListener("click", () => {
          if (timers.length === 0) return;
          if (confirm("Are you sure you want to delete all timers?")) {
            for (const t of timers) {
              moveToTrash(t);
            }
            timers = [];
            saveToStorage();
            render();
            renderTrash();
          }
        });

        // Update remaining times every 200ms & detect completion
        setInterval(() => {
          let changed = false;
          const now = Date.now();
          for (const t of timers) {
            if (!t.paused && !t.notified && now >= t.endAt) {
              t.notified = true;
              playBeep(3, 1000, 0.18, 0.08);
              changed = true;
            }
          }

          const purged = purgeExpiredTrashItems();

          if (changed || purged) {
            saveToStorage();
            render();
            renderTrash();
            return;
          }

          // lightweight in-place update of the trash countdown
          const trashRows = [...trashListEl.children];
          trashRows.forEach((row) => {
            const id = Number(row.dataset.id);
            const t = trash.find((x) => x.id === id);
            if (!t) return;

            const remainEl = $(".remain", row);
            const purgesIn = clamp0(TRASH_RETENTION_MS - (now - t.deletedAt));
            remainEl.textContent = humanize(purgesIn);
          });

          // lightweight in-place update
          const rows = [...listEl.children];
          rows.forEach((row) => {
            const id = Number(row.dataset.id);
            const t = timers.find((x) => x.id === id);
            if (!t) return;

            const remainEl = $(".remain", row);
            const statusEl = $(".status", row);

            let remaining;
            if (t.paused) {
              remaining = t.remainingAtPause || 0;
            } else {
              remaining = t.endAt - now;
            }

            if (t.paused) {
              statusEl.textContent = "Paused";
              statusEl.classList.remove("ok");
              statusEl.classList.add("done");
              remainEl.textContent = humanize(clamp0(remaining));
            } else if (remaining <= 0) {
              statusEl.textContent = "Done";
              statusEl.classList.remove("ok");
              statusEl.classList.add("done");
              remainEl.textContent = humanize(0);
            } else {
              remainEl.textContent = humanize(remaining);
            }
          });
        }, 200);

        if (purgeExpiredTrashItems()) {
          saveToStorage();
        }
        render();
        renderTrash();
        renderArchived();
      })();
    </script>
  </body>
</html>
